agent_id: customer_lifecycle_agent
name: "CustomerLifecycleAgent"
version: "0.1.0"
status: PROPOSED
description: >
  Manages the full customer lifecycle from onboarding to offboarding.
  Maintains dual entity model (Individual / Company) with UBO registry
  for corporate customers. Handles lifecycle state transitions:
  onboarding → active → dormant → offboarded → deceased.
  Stores full PII + KYC status + risk level per FCA COBS 9A and MLR 2017.
level: 2
trust_zone: GREEN
bounded_context: CTX-06-CUSTOMER
autonomy: L1_AUTO
capabilities:
  - customer_profile_management
  - dual_entity_model
  - ubo_registry
  - lifecycle_state_machine
  - kyc_status_sync
department: "Customer Management"
human_double: "Customer Support Lead"
entity_types:
  individual:
    fields: [name, DOB, nationality, PII, kyc_status, risk_level]
    fca_rule: "MLR 2017 §18 (CDD)"
  company:
    fields: [company_name, registration_number, UBO_chain, director_registry]
    fca_rule: "MLR 2017 §19 (KYB), Companies House API"
lifecycle_states:
  - ONBOARDING
  - ACTIVE
  - DORMANT
  - OFFBOARDED
  - DECEASED
ports:
  inbound:
    - port: CustomerPort
      description: Receives CustomerProfileRequest (create/update/query)
  outbound:
    - port: KYCPort
      description: Reads KYC verification status from KYC-Specialist-v2
    - port: AgreementPort
      description: Binding post-KYC approval
    - port: NotificationPort
      description: Status change alerts
    - port: AuditPort
      description: FCA audit trail (CASS 7.13, UK GDPR)
allowed_callers:
  - kyc_specialist_v2
  - aml_analyst_v1
  - agreement_agent
  - admin_panel
allowed_callees:
  - agreement_agent
  - notification_agent
  - reporting_agent
invariants:
  - I-02  # blocked jurisdictions
  - I-06  # data retention 5yr
governance:
  change_class: CLASS_B
  owner: "Customer Support Lead + CTIO"
  review_cycle: quarterly
  last_reviewed: "2026-04-08"
  approvers:
    - DEVELOPER
    - CTIO
fca_references:
  - "UK GDPR Art.5 — data minimisation + storage limitation"
  - "FCA COBS 9A — customer record keeping"
  - "MLR 2017 — AML record retention"
blockers:
  - id: BT-005
    description: "Companies House API key — UBO registry (KYB)"
    owner: CEO
    action: "Register at developer.company-information.service.gov.uk"
migration_status: 10%
compliance_matrix_refs:
  - S17-01  # dual entity model
  - S17-09  # lifecycle state machine
  - S17-10  # UBO registry (blocked BT-005)
aigf_risks:
  - AIGF-P-01  # PII data breach
  - AIGF-C-03  # GDPR non-compliance
allowed_skills:
  - context_memory_sync       # MANDATORY — IL continuity
  - rapid_spec_builder        # MANDATORY — before new lifecycle state or KYC rule
  - error_handling_standardizer  # MANDATORY — typed CustomerManagementError (I-24)
  - api_contract_guardian     # MANDATORY — CustomerPort contract stability
  - smart_test_generator      # CONTROLLED — no PII in fixtures (UK GDPR)
  - clean_architecture_enforcer  # MANDATORY advisory
prohibited_skills:
  - auto_refactor_pro         # PROHIBITED — lifecycle state machine is business-critical
  - performance_scanner       # N/A — no SLA-sensitive path in customer lifecycle
preferred_skill_sequences:
  scenario_product_code_modification:
    - context_memory_sync       # CMS first — KYC state, lifecycle transitions
    - clean_architecture_enforcer  # boundary: CustomerPort must not couple to AML contour
    - api_contract_guardian     # CustomerPort contract stability
    - error_handling_standardizer  # typed CustomerManagementError (I-24)
    - smart_test_generator      # no PII in fixtures (UK GDPR)
    # quality-gate.sh MUST follow
  scenario_new_feature:
    - context_memory_sync
    - rapid_spec_builder        # IL required before new lifecycle state or KYC rule (I-28)
    - clean_architecture_enforcer
    - api_contract_guardian
    - smart_test_generator
    # quality-gate.sh MUST follow
mandatory_skill_triggers:
  context_memory_sync: ["any customer lifecycle session start"]
  rapid_spec_builder: ["new lifecycle state added", "new KYC rule", "UBO registry change"]
  api_contract_guardian: ["CustomerPort change", "AgreementPort change", "KYCPort change"]
  error_handling_standardizer: ["exception path added", "state transition error handling changed"]
  smart_test_generator: ["lifecycle state machine change", "onboarding flow change", "KYC status sync change"]
