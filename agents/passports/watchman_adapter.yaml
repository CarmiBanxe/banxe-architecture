agent_id: watchman_adapter
name: "Watchman Sanctions Adapter"
version: "1.1.0"
description: >
  Level-3 AMBER adapter. Wraps the Watchman open-source sanctions server
  (GoAML). Returns match confidence for name/entity screening.
  Invariant I-16: minMatch = 0.80 (never lower to avoid false negatives).
level: 3
trust_zone: AMBER
bounded_context: CTX-01
capabilities:
  - sanctions_screening
ports:
  outbound:
    - port: AuditPort
      interface: src/compliance/ports/audit_port.py
allowed_callers:
  - sanctions_check
  - aml_orchestrator
allowed_callees: []
invariants:
  - I-24
governance:
  change_class: CLASS_B
  owner: "Compliance Engineering"
  review_cycle: quarterly
  last_reviewed: "2026-04-05"
  approvers:
    - DEVELOPER
    - MLRO
fca_references:
  - "MLR 2017 Reg.28(1)"
aigf_risks:
  - AIGF-E-01
