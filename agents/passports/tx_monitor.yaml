agent_id: tx_monitor
name: "Transaction Monitor"
version: "2.1.0"
description: >
  Level-2 agent. Evaluates transaction patterns against AMLTRIX scenarios
  loaded from scenario_registry.yaml. Computes velocity signals, structuring
  patterns, and rapid movement indicators. Operates independently of sanctions.
level: 2
trust_zone: AMBER
bounded_context: CTX-01
capabilities:
  - tx_monitoring
  - risk_assessment
ports:
  inbound:
    - port: PolicyPort
      interface: src/compliance/ports/policy_port.py
      adapter: src/compliance/adapters/compliance_config_adapter.py
  outbound:
    - port: AuditPort
      interface: src/compliance/ports/audit_port.py
allowed_callers:
  - banxe_aml_orchestrator
allowed_callees: []
invariants:
  - I-21
  - I-24
governance:
  change_class: CLASS_B
  owner: "Compliance Engineering"
  review_cycle: quarterly
  last_reviewed: "2026-04-05"
  approvers:
    - DEVELOPER
    - CTIO
fca_references:
  - "MLR 2017 Reg.28(3) — transaction monitoring"
aigf_risks:
  - AIGF-A-03
allowed_skills:
  - context_memory_sync       # MANDATORY — IL continuity
  - rapid_spec_builder        # MANDATORY — before threshold or rule change (I-05, I-28)
  - error_handling_standardizer  # MANDATORY — typed exceptions; audit writes survive (I-24)
  - performance_scanner       # MANDATORY — AML monitoring SLA
  - api_contract_guardian     # MANDATORY — TxMonitorRequest/MonitorResult contract
  - smart_test_generator      # CONTROLLED — no float in financial assertions (I-05)
  - clean_architecture_enforcer  # MANDATORY advisory — no cross-contour imports (I-20)
prohibited_skills:
  - auto_refactor_pro         # PROHIBITED — AML threshold logic is compliance-critical (I-20)
  - dependency_optimizer      # CONTROLLED — AML lib changes require licence audit
preferred_skill_sequences:
  scenario_product_code_modification:
    - context_memory_sync       # CMS first — threshold state, velocity window state
    - performance_scanner       # MANDATORY — AML monitoring SLA before any hot-path change
    - error_handling_standardizer  # typed exceptions; audit writes survive (I-24)
    - api_contract_guardian     # TxMonitorRequest/MonitorResult contract
    - smart_test_generator      # no float in financial assertions (I-05)
    # quality-gate.sh MUST follow
  scenario_new_feature:
    - context_memory_sync
    - rapid_spec_builder        # IL required before threshold or rule change (I-28)
    - api_contract_guardian
    - performance_scanner       # SLA validation before new rule ships
    - smart_test_generator
    # quality-gate.sh MUST follow
mandatory_skill_triggers:
  context_memory_sync: ["any tx_monitor session start"]
  rapid_spec_builder: ["new monitoring rule", "threshold change", "velocity window change"]
  api_contract_guardian: ["TxMonitorRequest change", "MonitorResult change", "PolicyPort change"]
  performance_scanner: ["any monitoring hot-path change", "velocity tracker change", "throughput claim"]
  error_handling_standardizer: ["exception path change", "audit write path change (I-24)"]
  smart_test_generator: ["threshold change", "structuring rule change", "velocity window change"]
