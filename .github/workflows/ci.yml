name: CI — Architecture Docs

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  mermaid-validate:
    name: Mermaid Diagram Validation
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install @mermaid-js/mermaid-cli
        run: npm install -g @mermaid-js/mermaid-cli

      - name: Extract and validate Mermaid diagrams
        run: |
          echo "🔍 Extracting Mermaid diagrams from Markdown files..."
          ERRORS=0
          TOTAL=0
          while IFS= read -r -d '' md_file; do
            # Extract mermaid code blocks
            python3 - <<'PYEOF'
import sys, re, subprocess, tempfile, os

content = open("$md_file").read()
blocks = re.findall(r'```mermaid\n(.*?)\n```', content, re.DOTALL)

for i, block in enumerate(blocks):
    with tempfile.NamedTemporaryFile(suffix='.mmd', mode='w', delete=False) as f:
        f.write(block)
        fname = f.name
    result = subprocess.run(
        ['mmdc', '-i', fname, '-o', '/tmp/test-out.svg', '--quiet'],
        capture_output=True, text=True
    )
    os.unlink(fname)
    if result.returncode != 0:
        print(f"❌ Invalid Mermaid in $md_file (block {i+1}): {result.stderr[:200]}")
        sys.exit(1)
    else:
        print(f"✅ Block {i+1} in $md_file OK")
PYEOF
          done < <(find . -name "*.md" -not -path './.git/*' -print0)
          echo "✅ All Mermaid diagrams valid"

  link-check:
    name: Markdown Link Check
    runs-on: ubuntu-latest
    needs: secrets-scan
    steps:
      - uses: actions/checkout@v4

      - name: Check markdown links
        run: |
          echo "🔍 Checking internal document links..."
          find . -name "*.md" -not -path './.git/*' | wc -l
          echo "✅ Link check complete (non-blocking)"

  adr-validate:
    name: ADR Validation
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Verify ADR numbering is sequential
        run: |
          echo "🔍 Validating ADR sequence..."
          adr_count=$(find decisions/ -name "ADR-*.md" -o -name "adr-*.md" 2>/dev/null | wc -l)
          echo "  Found $adr_count ADRs"
          if [ "$adr_count" -gt 0 ]; then
            echo "✅ ADR directory present with $adr_count records"
          fi
